name: ICC Scraper Auto-Update

on:
  schedule:
    - cron: '0 */12 * * *'   # Runs every 12 hours
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Scraper
        run: |
          python ICC_Scraper.py
          python ICC_Scraper.py -OD

      - name: Commit and Push if Changed
        run: |
          git config --global user.name "Jinx8004"
          git config --global user.email "Jinx8004@users.noreply.github.com"
          
          git add ICC_Events.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update ICC Events - $(date)"
            # Sync with remote before pushing
            git pull --rebase origin main
            git push
          fi
